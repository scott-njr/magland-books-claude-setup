name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  quality-gates:
    name: Lint · Tests · Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the secret scanner can diff against the base ref

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Secret scan (block commits containing API keys / tokens)
        run: bash scripts/check-secrets.sh --all

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Project conventions lint
        run: npm run lint:conventions

      - name: Jest unit tests
        run: npm test -- --ci

      - name: Next.js build
        run: npm run build
        env:
          # Build doesn't require integration secrets — service layers no-op gracefully when absent.
          # CI verifies the app compiles, types check, and routes generate.
          NEXT_PUBLIC_APP_URL: http://localhost:3000
